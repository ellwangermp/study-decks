<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Decks</title>
<style>
:root { --bg: #1a1a2e; --surface: #16213e; --card: #1e2a4a; --text: #e8e8e8; --text-muted: #a0a0b0; --gold: #d4a04a; --border: #2a3a5a; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.container { max-width: 600px; width: 100%; padding: 40px 20px; text-align: center; }
h1 { color: var(--gold); font-size: 28px; margin-bottom: 8px; }
p { color: var(--text-muted); margin-bottom: 30px; }
.deck-list { display: grid; gap: 16px; }
a.deck { display: block; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; text-decoration: none; transition: all 0.2s; }
a.deck:hover { border-color: var(--gold); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
a.deck h3 { color: var(--gold); font-size: 20px; margin-bottom: 6px; }
a.deck span { color: var(--text-muted); font-size: 14px; }
</style>
</head>
<body>
<div class="container">
  <h1>Study Decks</h1>
  <p>Flashcards, aulas e questoes — abre no navegador, sem instalar nada.</p>
  <div class="deck-list">
    <a class="deck" href="cirurgia-iv-m1.html">
      <h3>Cirurgia IV — M1</h3>
      <span>157 cards | 140 questoes | 6 topicos</span>
    </a>
    <a class="deck" href="ue-pediatria-m1.html">
      <h3>U&E Pediatria — M1</h3>
      <span>169 cards | 120 questoes | 10 topicos</span>
    </a>
    <a class="deck" href="cirurgia-iv-chico-m1.html">
      <h3>Cirurgia IV — Chico M1</h3>
      <span>67 cards | 135 questoes | 5 topicos</span>
    </a>
  </div>
</div>
</body>
</html>
